services:

  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    image: order-service:latest
    depends_on:
      order-db:
        condition: service_healthy
    environment:
      - ConnectionStrings__Database=Host=order-db;Port=5432;Database=order;Username=order_user;Password=order_pw
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - backend

  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    image: inventory-service:latest
    depends_on:
      inventory-db:
        condition: service_healthy
    environment:
      - ConnectionStrings__Database=Host=inventory-db;Port=5432;Database=inventory;Username=inventory_user;Password=inventory_pw
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - backend

  order-db:
    image: postgres:18-alpine
    container_name: order-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pw
      POSTGRES_DB: order
    volumes:
      - order_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  inventory-db:
    image: postgres:18-alpine
    container_name: inventory-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pw
      POSTGRES_DB: inventory
    volumes:
      - inventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  order_pgdata:
  inventory_pgdata:

networks:
  backend:
