name: orderprocessing-ref

services:

  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    image: order-service-ref:latest
    ports:
      - "9088:8080"
    depends_on:
      order-db-v2:  { condition: service_healthy }
      rabbitmq-v2:  { condition: service_healthy }
    environment:
      ConnectionStrings__Database: "Host=order-db-v2;Port=5432;Database=orders;Username=app;Password=app"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@rabbitmq-v2:5672"
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "order-service"
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
    networks: [backend]
    labels:
      dev.orbstack.http-port: "8080"

  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    image: inventory-service-ref:latest
    ports:
      - "9087:8080"
    depends_on:
      inventory-db: { condition: service_healthy }
      rabbitmq-v2:  { condition: service_healthy }
    environment:
      ConnectionStrings__Database: "Host=inventory-db;Port=5432;Database=inventory;Username=app;Password=app"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@rabbitmq-v2:5672"
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "inventory-service"
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
    networks: [backend]

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService/Dockerfile
    image: payment-service-ref:latest
    ports:
      - "9089:8080"
    depends_on:
      payment-db: { condition: service_healthy }
      rabbitmq-v2: { condition: service_healthy }
    environment:
      ConnectionStrings__Database: "Host=payment-db;Port=5432;Database=payments;Username=app;Password=app"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@rabbitmq-v2:5672"
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "payment-service"
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
    networks: [backend]

  # ── Observability ─────────────────────────────────────────────────────────────

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      ASPNETCORE_URLS: "http://0.0.0.0:18888"
    ports:
      - "18888:18888"  # UI
      - "18889:18889"  # OTLP gRPC
    networks: [backend]
    labels:
      dev.orbstack.http-port: "18888"

  # ── Databases ─────────────────────────────────────────────────────────────────

  order-db-v2:
    image: postgres:17-alpine
    container_name: order-db-ref
    environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: orders }
    volumes: [order_pgdata:/var/lib/postgresql/data]
    ports: ["6433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  inventory-db:
    image: postgres:17-alpine
    container_name: inventory-db-ref
    environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: inventory }
    volumes: [inventory_pgdata:/var/lib/postgresql/data]
    ports: ["6434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  payment-db:
    image: postgres:17-alpine
    container_name: payment-db-ref
    environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: payments }
    volumes: [payment_pgdata:/var/lib/postgresql/data]
    ports: ["6435:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d payments"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  rabbitmq-v2:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq-ref
    ports:
      - "6672:5672"                         # master uses 5672
      - "16672:15672"                       # master uses 15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    labels:
      dev.orbstack.http-port: "15672"
    networks: [backend]

volumes:
  order_pgdata:
  inventory_pgdata:
  payment_pgdata:

networks:
  backend:
